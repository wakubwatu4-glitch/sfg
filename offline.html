<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3b82f6">
  <meta name="description" content="SwaMedia offline page. Washa data au Wi-Fi kisha rudi kuendelea kutazama movies na series kwa Kiswahili.">
  <meta name="robots" content="noindex,follow">
  <link rel="icon" href="/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <title>SwaMedia | No Internet</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), transparent 30%),
        linear-gradient(180deg, #020617 0%, #000000 100%);
      color: #e2e8f0;
    }
    .card {
      width: min(100%, 420px);
      padding: 32px 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 24px 50px rgba(0, 0, 0, 0.35);
      text-align: center;
    }
    .icon {
      width: 84px;
      height: 84px;
      margin: 0 auto 20px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      font-size: 34px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.05;
    }
    p {
      margin: 0 0 24px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    button {
      border: 0;
      border-radius: 16px;
      background: #2563eb;
      color: #fff;
      font: inherit;
      font-weight: 700;
      padding: 14px 18px;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">!</div>
    <h1>Hakuna mtandao</h1>
    <p>Washa data au Wi-Fi kisha jaribu tena. Ukirudi online, SwaMedia itafunguka tena kawaida.</p>
    <button type="button" onclick="location.reload()">Jaribu Tena</button>
  </main>
</body>
</html>
