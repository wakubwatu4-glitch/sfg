      .home-banner-placeholder {
        position: relative;
        height: 13rem;
        overflow: hidden;
        border-radius: 1rem;
        border: 1px solid rgba(255,255,255,0.06);
        background: linear-gradient(135deg, rgba(15,23,42,0.92), rgba(30,41,59,0.78), rgba(2,6,23,0.96));
        box-shadow: 0 18px 45px rgba(0,0,0,0.28);
      }
      .home-banner-placeholder::before {
        content: '';
        position: absolute;
        inset: auto 1rem 1rem 1rem;
        height: 3.4rem;
        border-radius: 0.85rem;
        background: rgba(255,255,255,0.06);
      }
      .home-banner-placeholder::after {
        content: '';

      @media (min-width: 768px) {

          height: 18rem;

      #ad-popup {
        transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
      }

      }
      #app-loader.loader-hidden {
        opacity: 0;
        pointer-events: none;

      /* Custom Loader Styles */
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #e2e8f0;
        transition: opacity 0.5s ease-in-out;
        flex-direction: column;
      }
      #app-loader .loader-icon svg {
        width: 5rem;
        height: 5rem;
        color: #ef4444;
      }
      #app-loader .loader-text {
        color: #ef4444;
      }
      #app-loader .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.85rem;
        padding: 1rem;
      }
      #app-loader .loader-brand {
        display: flex;
        align-items: center;
        gap: 0.9rem;
      }
      #app-loader .loader-icon {
        width: 4.5rem;
        height: 4.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-loader .loader-icon svg {
        transform-origin: center;
        animation: loaderLaugh 1.15s ease-in-out infinite;
        filter: drop-shadow(0 8px 16px rgba(239, 68, 68, 0.16));
      }
      #app-loader .loader-text {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        display: flex;
      }
      #app-loader .loader-action {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 0.15rem;
      }
      #app-loader .loader-progress {
        position: absolute;
        left: 50%;
        bottom: 2.45rem;
        width: min(8.75rem, 38vw);
        height: 0.12rem;
        transform: translateX(-50%);
        overflow: hidden;
        border-radius: 9999px;
        background: rgba(37, 99, 235, 0.18);
        box-shadow:
          inset 0 0 0 1px rgba(96, 165, 250, 0.22),
          0 0 16px rgba(59, 130, 246, 0.18);
      }
      #app-loader .loader-progress span {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        transform: scaleX(var(--loader-progress, 0.08));
        transform-origin: left center;
        transition: transform 0.18s ease-out;
        background: linear-gradient(90deg, #1d4ed8, #38bdf8, #93c5fd);
        box-shadow: 0 0 14px rgba(56, 189, 248, 0.62);
      }
      #app-loader .loader-progress::after {
        content: '';
        position: absolute;
        inset: 0;
        width: 38%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.82), transparent);
        transform: translateX(-120%);
        animation: techLineScan 1.2s ease-in-out infinite;
      }
      #app-loader .loader-dot {
        width: 0.48rem;
        height: 0.48rem;
        border-radius: 9999px;
        background: rgba(239, 68, 68, 0.95);
        box-shadow: 0 0 12px rgba(239, 68, 68, 0.28);
        animation: loaderDotPulse 0.9s ease-in-out infinite;
      }
      #app-loader .loader-dot:nth-child(2) {
        animation-delay: 0.14s;
      }
      #app-loader .loader-dot:nth-child(3) {
        animation-delay: 0.28s;
      }
      #app-loader .loader-text span {
        opacity: 0;
        animation: fadeInUp 0.6s ease-out forwards;
      }
      #app-loader .loader-text span:nth-child(1) { animation-delay: 0.5s; }
      #app-loader .loader-text span:nth-child(2) { animation-delay: 0.6s; }
      #app-loader .loader-text span:nth-child(3) { animation-delay: 0.7s; }
      #app-loader .loader-text span:nth-child(4) { animation-delay: 0.8s; }
      #app-loader .loader-text span:nth-child(5) { animation-delay: 0.9s; }
      #app-loader .loader-text span:nth-child(6) { animation-delay: 1.0s; }
      #app-loader .loader-text span:nth-child(7) { animation-delay: 1.1s; }
      #app-loader .loader-text span:nth-child(8) { animation-delay: 1.2s; }
      #app-loader .loader-powered-by {
        position: absolute;
        left: 50%;
        bottom: 0.9rem;
        transform: translateX(-50%);
        width: calc(100% - 2rem);
        font-size: 0.5rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.52);
        text-align: center;
      }

      @keyframes bounceIn {
        0% { transform: scale(0.5); opacity: 0; }
        50% { transform: scale(1.1); }
        70% { transform: scale(0.9); }
        100% { transform: scale(1); opacity: 1; }
      }

      @keyframes fadeInUp {
          from {
              transform: translateY(20px);
              opacity: 0;
          }
          to {
              transform: translateY(0);
              opacity: 1;
          }
      }
      @keyframes loaderDotPulse {
        0%, 80%, 100% {
          transform: translateY(0) scale(0.88);
          opacity: 0.35;
        }
        40% {
          transform: translateY(-4px) scale(1);
          opacity: 1;
        }
      }
      @keyframes loaderLaugh {
        0%, 100% {
          transform: translateX(0) translateY(0) rotate(0deg) scale(1);
        }
        15% {
          transform: translateX(-2px) translateY(-1px) rotate(-6deg) scale(1.02);
        }
        30% {
          transform: translateX(2px) translateY(-3px) rotate(7deg) scale(1.08);
        }
        45% {
          transform: translateX(-1px) translateY(-2px) rotate(-5deg) scale(1.04);
        }
        60% {
          transform: translateX(2px) translateY(-4px) rotate(5deg) scale(1.09);
        }
        75% {
          transform: translateX(-1px) translateY(-1px) rotate(-3deg) scale(1.03);
        }
      }
      @keyframes techLineScan {
        100% {
          transform: translateX(270%);
        }
      }
      @keyframes bannerPlaceholderShimmer {
        100% {
          transform: translateX(100%);
        }
      }
      
      /* New Page Transition Loader Styles */
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 250;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.28s ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(2, 6, 23, 0.38);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      #page-loader::before {
        content: 'Loading...';
        min-width: 148px;
        height: 52px;
        border-radius: 9999px;
        padding: 0 1.25rem 0 3.3rem;
        display: inline-flex;
        align-items: center;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #e2e8f0;
        border: 1px solid rgba(255,255,255,0.14);
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(2, 6, 23, 0.98));
        box-shadow: 0 22px 60px rgba(0,0,0,0.32);
      }
      #page-loader::after {
        content: '';
        position: absolute;
        width: 28px;
        height: 28px;
        border-radius: 9999px;
        border: 3px solid rgba(255,255,255,0.18);
        border-top-color: var(--app-accent);
        border-right-color: rgba(255,255,255,0.92);
        box-shadow: 0 0 18px var(--app-accent-soft);
        transform: translateX(-46px);
        animation: orb-spin 0.9s linear infinite;
      }
      #page-loader.page-loader-visible {
        opacity: 1;
      }
      @keyframes orb-spin {
        0% { transform: translateX(-46px) rotate(0deg); }
        100% { transform: translateX(-46px) rotate(360deg); }
      }

      #app-container.page-transitioning {
        opacity: 0.6;
        transition: opacity 0.2s ease-in-out;
        pointer-events: none;
      }
      #app-container.startup-pending {
        opacity: 0;
        visibility: hidden;
      }
      #app-container.startup-ready {
        opacity: 1;
        visibility: visible;
        transition: opacity 0.25s ease-in-out;
      }
      /* Story Reader Themes */

        const getGoogleDriveUrls = (url) => {
            if (!url || typeof url !== 'string') return { previewUrl: null, downloadUrl: null };

            const trimmedUrl = url.trim();
            let fileId = null;

            try {
                const parsedUrl = new URL(trimmedUrl);
                const hostname = parsedUrl.hostname.toLowerCase();

                if (hostname.includes('drive.google.com') || hostname.includes('docs.google.com')) {
                    fileId = parsedUrl.searchParams.get('id');

                    if (!fileId) {
                        const pathMatch = parsedUrl.pathname.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                        if (pathMatch && pathMatch[1]) {
                            fileId = pathMatch[1];
                        }
                    }

                    if (!fileId) {
                        const altPathMatch = trimmedUrl.match(/[-\w]{25,}/);
                        if (altPathMatch && altPathMatch[0]) {
                            fileId = altPathMatch[0];
                        }
                    }
                }
            } catch (error) {
                const fallbackMatch = trimmedUrl.match(/(?:\/d\/|id=)([a-zA-Z0-9_-]+)/);
                if (fallbackMatch && fallbackMatch[1]) {
                    fileId = fallbackMatch[1];
                }
            }

            if (fileId) {
                return {
                    previewUrl: `https://drive.google.com/file/d/${fileId}/preview`,
                    downloadUrl: `https://drive.usercontent.google.com/download?id=${fileId}&export=download&confirm=t`
                };
            }

            return { previewUrl: trimmedUrl, downloadUrl: trimmedUrl };
        };

        const fetchData = async (type, options = {}) => {
            const path = String(type || '').replace(/^\/+/, '');
            const ttl = Number(options.ttl || DATA_SNAPSHOT_CACHE_TTL_MS);
            const queryKeyParts = [];
            if (options.orderByChild) queryKeyParts.push(`orderBy:${options.orderByChild}`);
            if (options.limitToLast) queryKeyParts.push(`last:${Number(options.limitToLast)}`);
            const cacheKey = queryKeyParts.length ? `${path}?${queryKeyParts.join('&')}` : path;
            const cached = dataSnapshotCache.get(cacheKey);
            const shouldUseCache = !options.force && !shouldBypassDataCache(path);
            if (shouldUseCache && cached && Date.now() - cached.timestamp < ttl) {
                return cached.snapshot;
            }
            try {
                const constraints = [];
                if (options.orderByChild) constraints.push(orderByChild(options.orderByChild));
                if (options.limitToLast) constraints.push(limitToLast(Number(options.limitToLast)));
                const dbRef = ref(database, path);
                const snapshot = await get(constraints.length > 0 ? firebaseQuery(dbRef, ...constraints) : dbRef);
                const shouldCacheSnapshot = shouldUseCache && (!CONTENT_DATA_PATHS.has(path) || snapshot.exists());
                if (shouldCacheSnapshot) {
                    dataSnapshotCache.set(cacheKey, { snapshot, timestamp: Date.now() });
                }
                return snapshot;
            } catch (error) {
                if (cached?.snapshot) return cached.snapshot;
                console.error(`Error fetching ${path}:`, error);
                return createEmptyDataSnapshot();
            }
        };

        const sortContentItems = (items = []) => [...items].sort((a, b) => Number(b.createdAt || b.timestamp || 0) - Number(a.createdAt || a.timestamp || 0));
        const uniqueContentItems = (items = []) => {
            const seen = new Set();
            return (items || []).filter(item => {
                if (!item) return false;
                const key = `${normalizeContentType(item.type || 'movie')}:${item.id || item.title || Math.random()}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });
        };
        const getContentCollectionConfig = (contentTypeOrPath = '') => {
            const rawValue = String(contentTypeOrPath || '').trim();
            const normalizedRaw = rawValue.toLowerCase();
            const normalizedType = normalizeContentType(rawValue);
            return CONTENT_COLLECTION_CONFIGS.find(config =>
                config.path.toLowerCase() === normalizedRaw ||
                config.defaultType === normalizedType ||
                config.aliases.includes(normalizedRaw) ||
                config.aliases.includes(normalizedType)
            ) || null;
        };
        const getContentCollectionCacheKey = (path, options = {}) => {
            const keyParts = [path];
            if (options.cacheScope) keyParts.push(`scope:${options.cacheScope}`);
            if (options.orderByChild) keyParts.push(`orderBy:${options.orderByChild}`);
            if (options.limitToLast) keyParts.push(`last:${Number(options.limitToLast)}`);
            return keyParts.join('|');
        };
        const refreshCombinedContentCache = () => {
            const cachedItems = [];
            let latestTimestamp = 0;
            contentCollectionCache.forEach(entry => {
                if (!entry || !Array.isArray(entry.items)) return;
                cachedItems.push(...entry.items);
                latestTimestamp = Math.max(latestTimestamp, Number(entry.timestamp || 0));
            });
            allContentCache = sortContentItems(uniqueContentItems(cachedItems));
            allContentCacheTimestamp = latestTimestamp || (allContentCache.length > 0 ? Date.now() : 0);
            return allContentCache;
        };
        const refreshAllContentCompleteness = () => {
            allContentCacheComplete = CONTENT_COLLECTION_CONFIGS.every(config => contentCollectionCache.has(config.path));
            return allContentCacheComplete;
        };
        const cacheContentCollection = (path, items = [], options = {}) => {
            const cacheKey = getContentCollectionCacheKey(path, options);
            contentCollectionCache.set(cacheKey, {
                items: sortContentItems(items),
                timestamp: Date.now(),
                path,
                isComplete: !options.limitToLast && !options.cacheScope
            });
            refreshAllContentCompleteness();
            refreshCombinedContentCache();
        };
        const fetchContentCollection = async (contentTypeOrPath = '', options = {}) => {
            const config = getContentCollectionConfig(contentTypeOrPath);
            if (!config) return [];
            const forceRefresh = options.force === true;
            const ttl = Number(options.ttl || ALL_CONTENT_CACHE_TTL_MS);
            const cacheKey = getContentCollectionCacheKey(config.path, options);
            const cached = contentCollectionCache.get(cacheKey);
            if (!forceRefresh && cached && Date.now() - cached.timestamp < ttl) {
                return [...cached.items];
            }
            if (!forceRefresh && contentCollectionPromises.has(cacheKey)) {
                return contentCollectionPromises.get(cacheKey);
            }
            const loadPromise = (async () => {
                const snapshot = await fetchData(config.path, {
                    force: forceRefresh,
                    ttl,
                    orderByChild: options.orderByChild,
                    limitToLast: options.limitToLast
                });
                const items = transformSnapshotToArray(snapshot).map(item => ({
                    ...item,
                    type: normalizeContentType(item.type || config.defaultType)
                }));
                cacheContentCollection(config.path, items, options);
                return items;
            })().catch(error => {
                console.error(`Failed to fetch content collection ${config.path}:`, error);
                return cached?.items ? [...cached.items] : [];
            }).finally(() => {
                contentCollectionPromises.delete(cacheKey);
            });
            contentCollectionPromises.set(cacheKey, loadPromise);
            return loadPromise;
        };
        const fetchContentByTypes = async (contentTypes = [], options = {}) => {
            const requestedTypes = Array.isArray(contentTypes) ? contentTypes : [contentTypes];
            const configs = uniqueContentItems(
                requestedTypes
                    .map(type => getContentCollectionConfig(type))
                    .filter(Boolean)
                    .map(config => ({ id: config.path, type: config.defaultType, config }))
            ).map(entry => entry.config);
            if (configs.length === 0) return [];
            const results = await Promise.all(configs.map(config => fetchContentCollection(config.path, options)));
            return filterContentForPreferences(sortContentItems(uniqueContentItems(results.flat())));
        };
        const fetchHomeContent = async (options = {}) => {
            const [movies, series] = await Promise.all([
                fetchContentCollection('movies', {
                    ...options,
                    cacheScope: 'home',
                    orderByChild: 'createdAt',
                    limitToLast: HOME_MOVIES_LIMIT
                }),
                fetchContentCollection('series', {
                    ...options,
                    cacheScope: 'home',
                    orderByChild: 'createdAt',
                    limitToLast: HOME_SERIES_LIMIT
                })
            ]);
            return filterContentForPreferences(sortContentItems(uniqueContentItems([...movies, ...series])));
        };
        const fetchAllContent = async (options = {}) => {
            const forceRefresh = options.force === true;
            if (!forceRefresh && allContentCacheComplete && Array.isArray(allContentCache) && allContentCache.length > 0 && Date.now() - allContentCacheTimestamp < ALL_CONTENT_CACHE_TTL_MS) {
                return filterContentForPreferences([...allContentCache]);
            }
            if (!forceRefresh && allContentCachePromise) {
                const sharedContent = await allContentCachePromise;
                return filterContentForPreferences([...sharedContent]);
            }
            try {
                allContentCachePromise = Promise.all(
                    CONTENT_COLLECTION_CONFIGS.map(config => fetchContentCollection(config.path, { force: forceRefresh }))
                ).then(results => sortContentItems(uniqueContentItems(results.flat())));
                const allContent = await allContentCachePromise;
                allContentCache = allContent;
                allContentCacheTimestamp = allContent.length > 0 ? Date.now() : 0;
                return filterContentForPreferences([...allContentCache]);
            } catch (error) {
                console.error("Failed to fetch and cache content", error);
                refreshCombinedContentCache();
                return filterContentForPreferences([...allContentCache]);
            } finally {
                allContentCachePromise = null;
            }
        };
        const hasHomeMovieContent = (items = []) => (items || []).some(item =>
            item &&
            item.isPublished !== false &&
            normalizeContentType(item.type || 'movie') === 'movie'

        const waitForHomeMovieContent = async (retryCount = 0) => {
            let attempt = Math.max(0, retryCount);
            const maxAttempt = attempt + 2;
            while (getRouteRoot() === 'home' && attempt < maxAttempt) {
                const timeoutMs = Math.min(HOME_INITIAL_CONTENT_TIMEOUT_MS + (attempt * 650), 4200);
                const content = await withTimeout(
                    fetchHomeContent({ force: attempt > 0 }),
                    timeoutMs,
                    [],
                    `Home content attempt ${attempt + 1}`
                );
                if (Array.isArray(content) && hasHomeMovieContent(content)) {
                    return content;
                }
                attempt += 1;
                await wait(Math.min(220 + (attempt * 120), 700));
            }
            return filterContentForPreferences((allContentCache || []).filter(item => ['movie', 'series'].includes(normalizeContentType(item?.type || 'movie'))));
        };
        const scheduleHomeRepair = (delay = 1200) => {

            showHomeContentLoaderIfNeeded();
            homeEmptyRepairAttempts += 1;
            const freshContent = await withTimeout(
                fetchHomeContent({ force: homeEmptyRepairAttempts > 1 }),
                2600,

            if (hasHomeMovieContent(freshContent) && getRouteRoot() === 'home') {

        const requestNotificationPermission = async () => {
            if (isIosSafari()) {

                return;
            }
            if (!('Notification' in window)) {
                showNotification('Notifications hazipo kwenye browser hii.', 'error');
                return;
            }
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const messagingApi = await loadFirebaseMessagingModule();
                    if (!messagingApi) {
                        alert('Notifications hazijaweza kuwashwa kwenye browser hii.');
                        return;
                    }
                    const messaging = messagingApi.getMessaging(app);
                    const currentToken = await messagingApi.getToken(messaging, { vapidKey: VAPID_KEY });
                    if (currentToken) {
                        await saveFcmToken(currentToken);
                        alert('Notifications enabled successfully!');
                    } else {
                        alert('Could not get notification token. Please try again or check browser settings.');
                    }
                } else {
                    alert('Notification permission was denied. You can enable it in your browser settings.');

                console.error('An error occurred while getting token.', error);

                                ${metaChipsHtml || `<p class="text-xs text-slate-400 truncate">${yearText}${yearText && genreText ? ' • ' : ''}${genreText}</p>`}
                                ${visibleViewCount > 0 ? `<p class="text-[11px] text-slate-500 mt-1"><i class="fas fa-eye mr-1"></i>${formatCompactCount(visibleViewCount)} views</p>` : ''}
                            </div>
                            <span class="flex-shrink-0 text-[11px] text-slate-500"><i class="fas ${icon}"></i></span>
                        </div>

        const formatRatingText = (rating = '') => rating ? `${rating}/10` : 'N/A';
        const formatContentDate = (item = {}) => {
            const rawDate = item.releaseDate || item.date || item.createdAt || item.timestamp || '';

            const parsedDate = new Date(rawDate);
            return Number.isNaN(parsedDate.getTime()) ? String(rawDate) : parsedDate.toLocaleDateString();
        };

        const EducationItemCardTemplate = (item) => {
            if (!item || !item.id || !item.title) return '';
            const ratingText = formatRatingText(item.rating);

                <div class="w-full h-full rounded-full bg-orange-500/20 flex items-center justify-center text-orange-300 text-2xl">

                    </div>

        const normalizeGameTags = (tags = '') => {
            if (Array.isArray(tags)) return tags.map(tag => String(tag || '').trim()).filter(Boolean);
            return String(tags || '')
                .split(',')
                .map(tag => tag.trim())
                .filter(Boolean);
        };

        const getPublishedGames = async () => {
            if (gamesCache.length > 0) {
                return gamesCache;
            }
            const gamesSnap = await fetchData('games');
            if (!gamesSnap.exists()) {
                gamesCache = [];
                return gamesCache;
            }
            gamesCache = Object.entries(gamesSnap.val())
                .map(([id, value]) => ({ id, ...value }))
                .filter(item => item && item.isPublished !== false)
                .sort((a, b) => {
                    if (Boolean(b.isFeatured) !== Boolean(a.isFeatured)) {
                        return Number(Boolean(b.isFeatured)) - Number(Boolean(a.isFeatured));
                    }
                    return Number(b.sortOrder || b.createdAt || 0) - Number(a.sortOrder || a.createdAt || 0);
            });
            return gamesCache;
        };

        const getGameGenreText = (game = {}) => String(game.genre || game.category || 'Game').trim() || 'Game';
        const getGamePlatformLabel = (game = {}) => {
            const raw = String(game.platform || game.device || '').trim();
            if (/pc|windows|desktop/i.test(raw)) return 'PC';
            if (/iphone|ios/i.test(raw)) return 'iPhone';
            if (/android|mobile|phone|simu/i.test(raw)) return 'Mobile';
            return raw || 'PC / Mobile';
        };
        const getGameYearText = (game = {}) => {
            if (game.year) return String(game.year);
            const dateValue = Number(game.createdAt || game.timestamp || 0);
            if (!dateValue) return '2026';
            const parsedDate = new Date(dateValue);
            return Number.isNaN(parsedDate.getFullYear()) ? '2026' : String(parsedDate.getFullYear());
        };
        const getGameSizeText = (game = {}) => String(game.size || game.gameSize || 'Size N/A').trim() || 'Size N/A';
        const getGameDescription = (game = {}) => String(game.description || 'Game hii imewekwa kwenye SwaGames kwa users wanaopenda download na kucheza kwa PC au simu. Angalia details kabla ya kudownload.').trim();
        const getGameSortTime = (game = {}) => Number(game.updatedAt || game.createdAt || game.timestamp || 0);
        const getGameGenreList = (game = {}) => {
            const values = [game.genre, game.category, ...normalizeGameTags(game.tags)];
            return [...new Set(values.map(value => String(value || '').trim()).filter(Boolean))];
        };

        const gameMatchesCollection = (game = {}, collectionName = '') => {

                    ${items.length ? `

                            ${items.map(game => renderSwaGameMiniCard(game)).join('')}
                        </div>
                    ` : `<div class="rounded-2xl border border-white/10 bg-white/[0.04] p-5 text-sm text-slate-400">${emptyText}</div>`}

            `;
            const renderCollectionCard = (group) => `
                <article id="swagame-collection-${group.slug}" class="min-w-[18rem] max-w-[18rem] flex-shrink-0 rounded-2xl border border-white/10 bg-[#10141c] p-4">

                    <div class="mt-4 flex items-center justify-between gap-3">
                        <div>
                            <h3 class="text-lg font-black text-white">${escapeHtml(group.name)}</h3>

                        ${renderGameDetailsButton(group.items[0], 'rounded-xl border border-cyan-300/20 bg-cyan-400/10 px-3 py-2 text-xs font-black text-cyan-100 transition-colors hover:bg-cyan-400/20')}

                if (searchCancelBtn) searchCancelBtn.classList.toggle('hidden', !searchCommitted);
            };
            const syncSearchAdsVisibility = (value = '') => {
                if (!searchAdsContainer) return;

                searchAdsContainer.classList.toggle('hidden', hasQuery);
                searchAdsContainer.style.display = hasQuery ? 'none' : 'block';

            const renderSuggestions = (query) => {
                const normalizedQuery = normalizeSearchQuery(query).toLowerCase();
                if (!normalizedQuery) {
                    suggestionsContainer.classList.add('hidden');

                }
                if (searchCommitted) {
                    suggestionsContainer.classList.add('hidden');

                }
                const suggestions = publishedContent
                    .filter(item => {
                        const title = (item.title || '').toLowerCase();
                        const category = (item.category || '').toLowerCase();
                        const genre = formatGenreText(item).toLowerCase();
                        return title.includes(normalizedQuery) || category.includes(normalizedQuery) || genre.includes(normalizedQuery);
                    })
                    .sort((a, b) => {
                        const aTitle = (a.title || '').toLowerCase();
                        const bTitle = (b.title || '').toLowerCase();
                        const aStarts = aTitle.startsWith(normalizedQuery) ? 1 : 0;
                        const bStarts = bTitle.startsWith(normalizedQuery) ? 1 : 0;
                        if (aStarts !== bStarts) return bStarts - aStarts;
                        return aTitle.localeCompare(bTitle);

                if (suggestions.length === 0) {

            const startVoiceSearch = (targetInput, mode = 'title') => {

                if (!SpeechRecognitionCtor) {
                    showNotification('Mic search haipo kwenye browser hii.', 'error');
                    return;
                }
                if (activeRecognition) {
                    activeRecognition.stop();
                    activeRecognition = null;
                }
                const recognition = new SpeechRecognitionCtor();
                activeRecognition = recognition;
                recognition.lang = 'sw-TZ';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                recognition.onstart = () => showNotification('Ongea sasa, tunakusikiliza...', 'success');
                recognition.onresult = event => {

                    if (targetInput.tagName === 'TEXTAREA') {

                    renderSuggestions(transcript);
                    discoveryPanels.classList.toggle('hidden', !normalizeSearchQuery(transcript));
                    syncSearchAdsVisibility(transcript);
                    handleStandardSearch({ target: targetInput }, searchContentPromise, true);
                };
                recognition.onerror = () => showNotification('Mic haikuweza kusoma sauti yako.', 'error');
                recognition.onend = () => {

                if (!normalizeSearchQuery(currentQuery)) return;

                handleStandardSearch({ target: standardSearchInput }, publishedContent, false);

        const calculateAIScore = (item, query) => {
            if (!query) return 0;

            const stopWords = new Set(['the', 'a', 'an', 'is', 'in', 'on', 'of', 'for', 'with', 'to', 'and', 'or', 'but', 'i', 'you', 'he', 'she', 'it', 'we', 'they', 'what', 'who', 'when', 'where', 'why', 'how', 'movie', 'movies', 'series', 'dj', 'ya', 'za', 'na', 'kama', 'kwa', 'au', 'ni']);
            
            const processText = (text) => (text || '').toLowerCase();
            
            const processQuery = (q) => {
                const tokens = processText(q).split(/[\s,.-]+/).filter(w => w.length > 1 && !stopWords.has(w));
                // Simple stemming
                return tokens.map(token => {
                    if (token.endsWith('s')) return token.slice(0, -1);
                    if (token.endsWith('ing')) return token.slice(0, -3);
                    if (token.endsWith('ed')) return token.slice(0, -2);
                    return token;
                });
            };

            const queryTokens = processQuery(query);
            if (queryTokens.length === 0 && !query.match(/\d/)) return 0; // Don't search if only stopwords
            
            let score = 0;
            const weights = {
                title: 50,
                fullTitle: 200,
                category: 30,
                dj: 30,
                description: 3,
                fullDescription: 50,
                year: 40,
                cast: 2,
                rating: 10
            };

            const title = processText(item.title);
            const description = processText(item.description);
            const category = processText(item.category);
            const dj = processText(getResolvedDjName(item));
            const cast = processText(item.cast);
            const itemType = processText(item.type);

            // Full phrase matching (higher weight)
            if (title.includes(query.toLowerCase())) score += weights.fullTitle;
            if (description.includes(query.toLowerCase())) score += weights.fullDescription;
            
            // Token-based matching
            queryTokens.forEach(token => {
                if (title.includes(token)) score += weights.title;
                if (category.includes(token)) score += weights.category;
                if (itemType.includes(token)) score += weights.category; // Treat type like a category
                if (dj.includes(token)) score += weights.dj;
                if (description.includes(token)) score += weights.description;
                if (cast.includes(token)) score += weights.cast;
            });
            
            // Contextual & Numeric Keyword Matching
            const numbers = query.match(/\d+(\.\d+)?/g) || [];
            numbers.forEach(numStr => {
                const num = parseFloat(numStr);
                // Year match
                if (num >= 1900 && num <= new Date().getFullYear() + 1) {
                    if (item.year && item.year.toString() === numStr) {
                        score += weights.year;
                    }
                }
                // Rating match
                else if (num >= 0 && num <= 10) {
                     if (item.rating && Math.abs(parseFloat(item.rating) - num) < 1.0) {
                         score += weights.rating * (10 - Math.abs(parseFloat(item.rating) - num));
                     }
                }
            });

            if ((query.includes('new') || query.includes('mpya') || query.includes('recent')) && item.year >= new Date().getFullYear() - 2) {
                score += 25;
            }
            if ((query.includes('old') || query.includes('zamani')) && item.year < 2010) {
                score += 20;
            }
            if ((query.includes('best') || query.includes('kali') || query.includes('nzuri')) && item.rating) {
                score += parseFloat(item.rating) * 5;
            }
            
            // Partial word matching bonus for title
            if (query.length > 3 && title.startsWith(query.toLowerCase())) {
                 score += 60;
            }

            return score;
        };

        const handleAISearch = async (e, preloadedContent = null, shouldCommit = false) => {
            const query = e.target.value;
            const resultsContainer = document.getElementById('search-results');
            
            if (!query || query.trim().length < 2) {
                resultsContainer.innerHTML = '<p class="col-span-full text-center text-slate-400 mt-8">Describe the movie or series you are looking for in the AI Search Bar.</p>';
                return;
            }
            
            resultsContainer.innerHTML = `<div class="col-span-full flex justify-center mt-8"><div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>`;
            
            const resolvedPreloadedContent = preloadedContent && typeof preloadedContent.then === 'function'
                ? await preloadedContent
                : preloadedContent;
            const allContent = resolvedPreloadedContent || await fetchAllContent();
            const publishedContent = filterContentForPreferences((allContent || []).filter(item => item && item.title && item.isPublished !== false));

            const scoredResults = publishedContent
                .map(item => ({ ...item, score: calculateAIScore(item, query) }))
                .filter(item => item.score > 0)
                .sort((a, b) => b.score - a.score);

            if (shouldCommit) {
                saveSearchHistoryEntry(query, 'ai');
                renderSearchHistoryChips();
                await recordSearchAnalytics(query);
            }

            if (scoredResults.length > 0) {
                resultsContainer.innerHTML = scoredResults.map((item, index) => 
                    itemCardTemplate(item, item.type, `search-result-item" style="animation-delay: ${Math.min(index * 30, 500)}ms;`)
                ).join('');
            } else {
                resultsContainer.innerHTML = renderMissingSearchResultCard(e.target.value, 'Smart search');
                bindMissingMovieRequestCard();
            }
        };

        const getSearchableTextForItem = (item = {}) => [
            item.title,
            item.description,
            item.category,
            item.type,
            getResolvedDjName(item),
            item.cast,
            formatGenreText(item),
            item.year
        ].filter(Boolean).join(' ').toLowerCase();
        const parseStructuredSearchQuery = (query = '') => {
            const normalized = normalizeSearchQuery(query).toLowerCase();
            const [titlePartRaw = '', djPartRaw = ''] = normalized.split('|');
            return {
                normalized,
                titlePart: titlePartRaw.trim(),
                djPart: djPartRaw.trim()
            };
        };
        const calculateStandardSearchScore = (item, query) => {
            const { normalized, titlePart, djPart } = parseStructuredSearchQuery(query);
            const normalizedQuery = normalized;
            if (!normalizedQuery) return 0;

            const title = (item.title || '').toLowerCase();
            const description = (item.description || '').toLowerCase();
            const category = (item.category || '').toLowerCase();
            const genre = formatGenreText(item).toLowerCase();
            const cast = (item.cast || '').toLowerCase();
            const dj = getResolvedDjName(item).toLowerCase();
            let score = 0;

            if (title === normalizedQuery) score += 500;
            if (title.startsWith(normalizedQuery)) score += 220;
            if (title.includes(normalizedQuery)) score += 160;
            if (category.includes(normalizedQuery)) score += 80;
            if (genre.includes(normalizedQuery)) score += 70;
            if ((item.type || '').toLowerCase().includes(normalizedQuery)) score += 55;
            if (dj.includes(normalizedQuery)) score += 45;
            if (cast.includes(normalizedQuery)) score += 35;
            if (description.includes(normalizedQuery)) score += 20;

            const tokens = normalizedQuery.split(/\s+/).filter(Boolean);
            tokens.forEach(token => {
                if (title.startsWith(token)) score += 40;
                if (title.includes(token)) score += 24;
                if (genre.includes(token)) score += 16;
                if (category.includes(token)) score += 16;
                if (description.includes(token)) score += 6;
            });

             if (titlePart) {
                if (title === titlePart) score += 900;
                if (title.startsWith(titlePart)) score += 320;
                if (title.includes(titlePart)) score += 240;
            }

            if (djPart) {
                if (dj === djPart) score += 300;
                if (dj.includes(djPart)) score += 180;
            }

            return score;
        };
        const handleStandardSearch = async (e, preloadedContent = null, shouldCommit = false) => {
            const rawQuery = e.target.value || '';
            const query = rawQuery.toLowerCase().trim();
            const resultsContainer = document.getElementById('search-results');
            const resultsMeta = document.getElementById('search-results-meta');
            const searchAdsContainer = document.getElementById('swamedia-ads-container');
            
            if (!query) {
                if (resultsMeta) {
                    resultsMeta.classList.add('hidden');
                    resultsMeta.textContent = '';
                }
                if (searchAdsContainer) {
                    searchAdsContainer.classList.remove('hidden');
                    searchAdsContainer.style.display = 'block';
                }
                resultsContainer.innerHTML = '<p class="col-span-full text-center text-slate-400 mt-8">Start typing in a search bar to see results.</p>';
                return;
            }

            if (searchAdsContainer) {
                searchAdsContainer.classList.add('hidden');
                searchAdsContainer.style.display = 'none';
            }

            const resolvedPreloadedContent = preloadedContent && typeof preloadedContent.then === 'function'
                ? await preloadedContent
                : preloadedContent;
            const allContent = resolvedPreloadedContent || await fetchAllContent();
            const publishedContent = filterContentForPreferences((allContent || []).filter(item => item && item.title && item.isPublished !== false));
            const parsedQuery = parseStructuredSearchQuery(rawQuery);
            const filteredResults = publishedContent
                .map(item => ({ item, score: calculateStandardSearchScore(item, query), searchableText: getSearchableTextForItem(item) }))
                .filter(entry => {
                    if (parsedQuery.titlePart && !String(entry.item.title || '').toLowerCase().includes(parsedQuery.titlePart)) {
                        return false;
                    }
                    if (parsedQuery.djPart && !getResolvedDjName(entry.item).toLowerCase().includes(parsedQuery.djPart)) {
                        return false;
                    }
                    return entry.score > 0 || entry.searchableText.includes(query);
                })
                .sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (a.item.title || '').length - (b.item.title || '').length;
                })
                .map(entry => entry.item);

            if (shouldCommit) {
                saveSearchHistoryEntry(rawQuery, 'title');
                renderSearchHistoryChips();
                await recordSearchAnalytics(rawQuery);
            }

            if (filteredResults.length > 0) {
                if (resultsMeta) {
                    resultsMeta.textContent = `${filteredResults.length} result${filteredResults.length === 1 ? '' : 's'} for "${normalizeSearchQuery(rawQuery)}"`;
                    resultsMeta.classList.remove('hidden');
                }
                resultsContainer.innerHTML = filteredResults.map((item, index) => 
                    itemCardTemplate(item, item.type, `search-result-item" style="animation-delay: ${Math.min(index * 30, 500)}ms;`)
                ).join('');
            } else {
                if (resultsMeta) {
                    resultsMeta.textContent = `No results for "${normalizeSearchQuery(rawQuery)}"`;
                    resultsMeta.classList.remove('hidden');
                }
                resultsContainer.innerHTML = renderMissingSearchResultCard(rawQuery, 'Title search');
                bindMissingMovieRequestCard();
            }
        };

        const renderSwaMediaAds = async () => {

                                phoneInput.disabled = true;

                                phoneInput.disabled = false;
                                amountInput.disabled = false;
                                submitText.classList.remove('hidden');
                                submitLoader.classList.remove('active');

                                statusPollInterval = null;

                                feedbackEl.className = 'text-sm min-h-[20px] text-yellow-300';
                                setPaymentStage('loading', 'Bado tunasubiri verification...', 'Kamilisha USSD prompt kwenye simu yako kisha subiri.');
                                submitBtn.disabled = false;
                                phoneInput.disabled = false;
                                amountInput.disabled = false;
                                submitText.classList.remove('hidden');
                                submitLoader.classList.remove('active');
                            }

                            clearInterval(statusPollInterval);
                            statusPollInterval = null;

        const timeSince = (timestamp) => {
            if (!timestamp) return '';
            const seconds = Math.floor((new Date() - new Date(timestamp)) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) { const val = Math.floor(interval); return val + (val === 1 ? " year ago" : " years ago"); }
            interval = seconds / 2592000;
            if (interval > 1) { const val = Math.floor(interval); return val + (val === 1 ? " month ago" : " months ago"); }
            interval = seconds / 86400;
            if (interval > 1) { const val = Math.floor(interval); return val + (val === 1 ? " day ago" : " days ago"); }
            interval = seconds / 3600;
            if (interval > 1) { const val = Math.floor(interval); return val + (val === 1 ? " hour ago" : " hours ago"); }
            interval = seconds / 60;
            if (interval > 1) { const val = Math.floor(interval); return val + (val === 1 ? " minute ago" : " minutes ago"); }
            return Math.floor(seconds) + " seconds ago";
        };
        const copyTextToClipboard = async (text = '') => {
            const safeText = String(text || '');
            if (!safeText) throw new Error('Nothing to copy.');
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(safeText);
                return true;
            }
            const tempInput = document.createElement('textarea');
            tempInput.value = safeText;
            tempInput.setAttribute('readonly', 'readonly');
            tempInput.style.position = 'fixed';
            tempInput.style.opacity = '0';
            document.body.appendChild(tempInput);
            tempInput.focus();
            tempInput.select();
            const copied = document.execCommand('copy');
            document.body.removeChild(tempInput);
            if (!copied) throw new Error('Copy command failed.');
            return true;
        };

        const handleFeedbackSubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) {
                showLoginRequiredModal();
                return;
            }

            const form = e.target;
            const textarea = form.querySelector('#feedback-textarea');
            const messageEl = form.querySelector('#feedback-message');
            const button = form.querySelector('button[type="submit"]');
            const comment = textarea.value.trim();

            if (!comment) {
                messageEl.textContent = 'Tafadhali andika maoni yako.';
                messageEl.classList.remove('text-green-400');
                messageEl.classList.add('text-red-400');
                return;
            }

            button.disabled = true;
            button.querySelector('.btn-text').classList.add('hidden');
            button.querySelector('.btn-loader').classList.add('active');
            messageEl.textContent = '';

            try {
                await push(ref(database, 'feedback'), {
                    userId: currentUser?.uid || getOrCreateGuestUserId(),
                    user: currentUser?.displayName || currentUser?.username || currentUser?.phone || currentUser?.email || 'Guest User',
                    comment: comment,
                    timestamp: Date.now(),
                    status: 'pending'
                });
                textarea.value = '';
                messageEl.textContent = 'Asante! Maoni yako yamepokelewa.';
                messageEl.classList.add('text-green-400');
                messageEl.classList.remove('text-red-400');
            } catch (error) {
                console.error("Error submitting feedback:", error);
                messageEl.textContent = 'Imeshindwa kutuma. Tafadhali jaribu tena.';
                messageEl.classList.remove('text-green-400');
                messageEl.classList.add('text-red-400');
            } finally {
                button.disabled = false;
                button.querySelector('.btn-text').classList.remove('hidden');
                button.querySelector('.btn-loader').classList.remove('active');
                setTimeout(() => { messageEl.textContent = '' }, 4000);
            }
        };

        const handleForgotPassword = async () => {
            const identifier = document.getElementById('auth-login-identifier')?.value || document.getElementById('auth-email')?.value || '';
            const feedbackEl = document.getElementById('auth-feedback');
            
            if (!identifier) {
                feedbackEl.textContent = 'Andika email yako ili uweze kubadili password.';
                feedbackEl.className = 'text-sm text-red-400 min-h-[20px] mb-2 leading-snug';
                return;
            }
             if (isPhoneNumber(identifier)) {
                feedbackEl.textContent = 'Kubadili password hakupo kwa simu. Wasiliana na support.';
                feedbackEl.className = 'text-sm text-red-400 min-h-[20px] mb-2 leading-snug';
                return;
            }

            try {
                await sendPasswordResetEmail(auth, identifier);
                feedbackEl.textContent = 'Email ya kubadili password imetumwa. Angalia inbox yako (na spam pia).';
                feedbackEl.className = 'text-sm text-green-400 min-h-[20px] mb-2 leading-snug';
            } catch (error) {
                console.error(error);
                // alert removed - using custom message
                let errorMessage = 'Imeshindwa kutuma email. Hakikisha email ni sahihi.';
                if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Hii email haijajisajili.';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Email si sahihi.';
                } else if (error.code === 'auth/missing-android-pkg-name') {
                    errorMessage = 'Tatizo la app. Jaribu tena.';
                }
                feedbackEl.textContent = errorMessage;
                feedbackEl.className = 'text-sm text-red-400 min-h-[20px] mb-2 leading-snug';
            }
        };

        const handleAuthAction = async (action, email, password, feedbackEl, btn, originalIdentifier, extraData = {}) => {
            feedbackEl.textContent = '';
            feedbackEl.className = 'text-sm min-h-[20px] mb-2 leading-snug';
            btn.querySelector('.btn-text').classList.add('hidden');
            btn.querySelector('.btn-loader').classList.add('active');
            btn.disabled = true;

            try {
                if (action === 'signup') {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const referralCode = await generateUniqueReferralCode(userCredential.user.uid);
                    const dbData = {
                        email: userCredential.user.email,
                        uid: userCredential.user.uid,
                        username: extraData.username || '',
                        displayName: extraData.username || '',
                        premiumExpiry: 0,
                        rewardPoints: 0,
                        rewardAccessExpiry: 0,
                        referralRewardsClaimed: 0,
                        successfulReferralPurchases: 0,
                        referralPurchaseQualified: false,
                        referralCode,
                        referralLink: buildReferralLink(referralCode),
                        createdAt: Date.now()
                    };
                    if (isPhoneNumber(originalIdentifier)) {
                        dbData.phone = originalIdentifier;
                    }
                    await set(ref(database, 'users/' + userCredential.user.uid), dbData);
                    await set(ref(database, `referralCodes/${referralCode}`), {
                        uid: userCredential.user.uid,
                        createdAt: dbData.createdAt
                    });
                    showNotification('Usajili umefanikiwa! Karibu SwaMedia.', 'success');
                    feedbackEl.textContent = 'Usajili umefanikiwa!';
                    feedbackEl.classList.add('text-green-400');
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    showNotification('Umefanikiwa kuingia!', 'success');
                }
            } catch (error) {
                console.error(error);
                let errorMessage = 'Hitilafu imetokea. Jaribu tena.';
                const errorCode = error.code;

                if (errorCode === 'auth/invalid-credential' || errorCode === 'auth/wrong-password' || errorCode === 'auth/invalid-email') {
                    errorMessage = 'Email au password si sahihi. Jaribu tena.';
                } else if (errorCode === 'auth/email-not-found' || errorCode === 'auth/user-not-found') {
                    errorMessage = 'Hii email haijajisajili. Jisajili ili uingie.';
                } else if (errorCode === 'auth/email-already-in-use') {
                    errorMessage = 'Email hii tayari ina account. Ingia au tumia email nyingine.';
                } else if (errorCode === 'auth/invalid-email') {
                    errorMessage = 'Email si sahihi.';
                } else if (errorCode === 'auth/weak-password') {
                    errorMessage = 'Password ni dhaifu. Tumia angalau herufi 6.';
                } else if (errorCode === 'auth/missing-password') {
                    errorMessage = 'Andika password.';
                } else if (errorCode === 'auth/too-many-requests') {
                    errorMessage = 'Majaribio mengi sana. Subiri kidogo.';
                } else if (errorCode === 'auth/unauthorized-continue-uri') {
                    errorMessage = 'Tatizo la server. Wasiliana na support.';
                } else if (!errorCode) {
                    errorMessage = 'Hitilafu imetokea. Jaribu tena.';
                } else {
                    errorMessage = 'Error: ' + errorCode;
                }

                feedbackEl.textContent = errorMessage;
                feedbackEl.classList.add('text-red-400');
            } finally {
                btn.querySelector('.btn-text').classList.remove('hidden');
                btn.querySelector('.btn-loader').classList.remove('active');
                syncAuthButtonStates();
            }
        };

        const handleLogin = (e) => {

            if (password !== confirmPassword) {
                feedbackEl.textContent = 'Password hazijafanana.';
                feedbackEl.className = 'text-sm text-red-400 min-h-[20px] mb-2 leading-snug';
                return;
            }
            if (!document.getElementById('auth-policy-checkbox')?.checked) {
                feedbackEl.textContent = 'Kubali policy za SwaMedia kwanza.';

            }
            const normalizedEmail = normalizeAuthIdentifier(identifier);
            
            // Get the clicked button
            const btn = e.target.closest('button') || e.target;
            handleAuthAction('signup', normalizedEmail, password, feedbackEl, btn, identifier, { username });

        const navigateTo = async (pageRoute, replaceState = false, navigationOptions = {}) => {
            const { skipUrlUpdate = false, skipHistoryStack = false, suppressLoader = false } = navigationOptions;
            const sensitivePages = ['Education', 'Review', 'connection'];

            if (isFamilyModeEnabled() && isSensitiveRoute(pageRoute)) {
                showNotification('Family mode imewashwa. Hii page imefichwa.', 'error');
                if (getCurrentRoute() !== 'home') {
                    pageRoute = 'home';
                } else {
                    return;
                }
            }

            const [page] = pageRoute.split(':');
            if (page !== 'profile' && profileCountdownTimer) {
                clearInterval(profileCountdownTimer);
                profileCountdownTimer = null;
            }
            
            if (sensitivePages.includes(page) && sessionStorage.getItem('ageVerified') !== 'true') {
                 showAgeGateModal(pageRoute);
                 return; 
            }

            if (!suppressLoader) {
                showPageLoader();
            }
            try {
                // const [page, param1, param2] = pageRoute.split(':'); // This is already destructured above
                const [, param1, param2] = pageRoute.split(':');
                
                if (!skipHistoryStack) {
                    if (!replaceState) {
                        historyStack.push(pageRoute);
                    } else if (historyStack.length > 0) {
                        historyStack[historyStack.length - 1] = pageRoute;
                    } else {
                        historyStack = [pageRoute];
                    }
                }

                if (!skipUrlUpdate) {
                    updateBrowserRoute(pageRoute, replaceState);

                             if (userVote) { // User is changing their vote
                                const oppositeType = voteType === 'like' ? 'dislike' : 'like';
                                updates[`${oppositeType}s`] = Math.max(0, oppositeType === 'like' ? currentLikes - 1 : currentDislikes - 1);
                             }
                             localStorage.setItem(VOTE_STORAGE_KEY, voteType);
                        }
                        
                        await update(itemRef, updates);
                        
                        document.getElementById('likes-count').textContent = updates.likes !== undefined && updates.likes !== null ? updates.likes : currentLikes;
                        document.getElementById('dislikes-count').textContent = updates.dislikes !== undefined && updates.dislikes !== null ? updates.dislikes : currentDislikes;

                        updateVoteUI();

                    } catch(error) {
                        console.error("Voting error:", error);
                    } finally {
                        button.disabled = false;
                    }
                });
            });
        };

        const showBandoModal = () => {
            if (!adSettings || !adSettings.bandoSettings) return;

            const bando = adSettings.bandoSettings;
            const modal = document.getElementById('premium-modal');
            const modalContent = modal.querySelector('.modal-content');
            
            const logoName = bando.logoName || 'SwaMedia Bando';
            const plansHtml = (bando.plans || [])
                .map(plan => `
                    <div class="bando-plan border-2 rounded-lg p-3 text-center cursor-pointer" data-gb="${plan.gb}" data-price="${plan.price}">
                        <div class="font-bold text-xl">${plan.gb} GB</div>
                        <div class="text-slate-400">Tsh ${plan.price}</div>
                    </div>
                `).join('');

            modalContent.innerHTML = `
                <button id="close-bando-modal-btn" class="absolute top-2 right-2 w-8 h-8 bg-gray-800 hover:bg-gray-700 transition-colors rounded-full text-slate-400 z-10">&times;</button>
                <h3 class="text-center font-semibold text-xl mb-4 text-red-400">${logoName}</h3>
                <div class="space-y-4">
                    <p class="text-slate-300 text-center text-sm">Chagua kifurushi cha internet unachotaka kununua.</p>
                    <div class="grid grid-cols-2 gap-3" id="bando-plans-container">${plansHtml}</div>
                    <a id="bando-whatsapp-btn" href="#" target="_blank" class="block w-full text-center bg-gray-600 text-white font-bold py-2 px-4 rounded-lg transition-colors pointer-events-none">
                        <i class="fab fa-whatsapp mr-2"></i>Pay
                    </a>
                </div>
            `;

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            modal.querySelector('#close-bando-modal-btn').addEventListener('click', () => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            });
            
            const plansContainer = modal.querySelector('#bando-plans-container');
            const whatsappBtn = modal.querySelector('#bando-whatsapp-btn');

            plansContainer.addEventListener('click', (e) => {
                const selectedPlanEl = e.target.closest('.bando-plan');
                if (!selectedPlanEl) return;

                plansContainer.querySelectorAll('.bando-plan').forEach(p => p.classList.remove('selected'));
                selectedPlanEl.classList.add('selected');

                const gb = selectedPlanEl.dataset.gb;
                const price = selectedPlanEl.dataset.price;
                const number = bando.whatsappNumber || '255772822552';
                const template = bando.messageTemplate || "Hello {logoName}, I would like to buy a {gb}GB bundle for Tsh {}.";
                const message = template.replace('{logoName}', logoName).replace('{gb}', gb).replace('{}', price);
                
                whatsappBtn.href = `https://wa.me/${number}?text=${encodeURIComponent(message)}`;
                whatsappBtn.classList.remove('bg-gray-600', 'pointer-events-none');
                whatsappBtn.classList.add('bg-green-600', 'hover:bg-green-700');
            });
        };

        const showAgeGateModal = (pageRoute) => {
            const modal = document.getElementById('age-gate-modal');
            const modalContent = document.getElementById('age-gate-modal-content');

            const renderVerificationStep = () => {
                modalContent.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-exclamation-triangle text-4xl text-yellow-400 mb-4"></i>
                        <h3 class="font-bold text-2xl mb-3 text-yellow-400">Tahadhari</h3>
                        <p class="text-slate-300 mb-6 text-sm leading-relaxed">
                            Kwenye Hii Page unayo taka kuingia kuna mauthui ya kingono, video zilizo vuja , picha za uchi , lugha chafu zina weza ku haribu maadili yako.
                            <br><br>
                            Ukibonyeza "Ndio" unathibitisha umekubaliana na maudhui utakayo kutana nayo.
                        </p>
                        <p class="font-semibold text-lg mb-6">Je, una miaka 18 na zaidi?</p>
                        <div class="flex justify-center space-x-4">
                            <button id="age-gate-yes" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg transition-colors">Ndio</button>
                            <button id="age-gate-no" class="bg-gray-600 hover:bg-gray-500 text-white font-bold py-2 px-8 rounded-lg transition-colors">Hapana</button>
                        </div>
                    </div>
                `;
                modal.querySelector('#age-gate-yes').addEventListener('click', () => {
                    sessionStorage.setItem('ageVerified', 'true');
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    navigateTo(pageRoute); // Proceed to navigation
                });
                modal.querySelector('#age-gate-no').addEventListener('click', () => {
                    renderRejectionStep();
                });
            };

            const renderRejectionStep = () => {
                 modalContent.innerHTML = `
                    <div class="text-center">
                        <i class="fas fa-ban text-4xl text-red-500 mb-4"></i>
                        <h3 class="font-bold text-2xl mb-4 text-red-400">Access Denied</h3>
                        <p class="text-slate-300 mb-6">Umri wako bado mdogo kuangalia maudhui haya. Asante kwa kujali maadili yako.</p>
                        <button id="age-gate-back" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-8 rounded-lg transition-colors">Back</button>
                    </div>
                `;
                modalContent.classList.remove('border-yellow-500');
                modalContent.classList.add('border-blue-500');

                modal.querySelector('#age-gate-back').addEventListener('click', () => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                    // Reset border for next time
                    setTimeout(() => {
                         modalContent.classList.remove('border-blue-500');
                         modalContent.classList.add('border-yellow-500');
                    }, 300);
                });
            };

            renderVerificationStep();
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };
        
        window.addEventListener('popstate', () => {
            const targetRoute = getRouteFromLocation();
            const existingRouteIndex = historyStack.lastIndexOf(targetRoute);
            if (existingRouteIndex >= 0) {
                historyStack = historyStack.slice(0, existingRouteIndex + 1);
            } else {
                historyStack.push(targetRoute);
            }
            navigateTo(targetRoute, true, { skipUrlUpdate: true, skipHistoryStack: true });
        });

        // Additional functions for watch page features
        function shareVideo() {
            if (navigator.share) {
                navigator.share({ title: 'Check out this video!', url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('Link copied!');
            }
        }

        function addToList(id) {
            if (!requireAuthenticatedUser('Ingia kwanza ndipo movie ihifadhiwe kwenye account yako.')) return;
            let list = getUserWatchlist();
            if (!list.includes(id)) {
                list.push(id);
                saveUserWatchlist(list);
                showNotification('Imeongezwa kwenye My List yako!', 'success');
                refreshMyListViews();
            } else {
                showNotification('Tayari ipo kwenye My List yako.', 'error');
            }
        }
        window.addToList = addToList;

        function removeFromList(id) {
            if (!requireAuthenticatedUser('Ingia kwanza kusimamia list yako.')) return;
            let list = getUserWatchlist();
            if (list.includes(id)) {
                list = list.filter(itemId => itemId !== id);
                saveUserWatchlist(list);
                showNotification('Imeondolewa kwenye My List yako!', 'success');
                refreshMyListViews();
            }
        }
        window.removeFromList = removeFromList;
        window.openContentFromList = (id, type = 'movie') => navigateTo(getContentRoute(id, type));

        function rateVideo(id, rating) {
            localStorage.setItem('rating_' + id, rating);
            alert('You rated ' + rating + ' stars!');
        }

        function voteVideo(id, type) {
            let current = localStorage.getItem(getUserVoteStorageKey(id));
            const likesEl = document.getElementById('likes-' + id);
            const dislikesEl = document.getElementById('dislikes-' + id);
            let likes = parseInt((likesEl ? likesEl.textContent : '0') || '0');
            let dislikes = parseInt((dislikesEl ? dislikesEl.textContent : '0') || '0');
            
            if (current === type) {
                // Remove vote
                if (type === 'like') likes = Math.max(0, likes - 1);
                else dislikes = Math.max(0, dislikes - 1);
                localStorage.removeItem(getUserVoteStorageKey(id));
            } else {
                // Add vote
                if (type === 'like') likes++; else likes--;
                if (type === 'dislike') dislikes++; else dislikes--;
                if (current === 'like') likes--;
                if (current === 'dislike') dislikes--;
                localStorage.setItem(getUserVoteStorageKey(id), type);
            }
            
            if (document.getElementById('likes-' + id)) document.getElementById('likes-' + id).textContent = likes;
            if (document.getElementById('dislikes-' + id)) document.getElementById('dislikes-' + id).textContent = dislikes;
        }

        function playNext(nextId) {
            const previewModal = document.getElementById('preview-modal');
            previewModal.classList.add('hidden');
            previewModal.classList.remove('flex');
            // Navigate to next episode
            navigateTo('details:' + nextId + ':series');
        }
        
        initApp();
    </script>
    <script>
      (() => {
        const loadTidioChat = () => {
          if (document.querySelector('script[data-tidio-chat="true"]')) return;
          if (window.matchMedia && window.matchMedia('(max-width: 640px)').matches) return;
          const script = document.createElement('script');
          script.src = 'https://code.tidio.co/butv1zkybzax5efzwh3qc7zty22bwaqy.js';
          script.async = true;
          script.dataset.tidioChat = 'true';
          document.body.appendChild(script);
        };
        const scheduleTidioChat = () => {
          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(loadTidioChat, { timeout: 12000 });
          } else {
            window.setTimeout(loadTidioChat, 8000);
          }
        };
        if (document.readyState === 'complete') {
          scheduleTidioChat();
        } else {
          window.addEventListener('load', scheduleTidioChat, { once: true });
        }
      })();
    </script>
</body>
